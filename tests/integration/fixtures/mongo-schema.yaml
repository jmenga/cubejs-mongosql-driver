# File-mode schema fixture — mirrors what `__sql_schemas` would expose
# after the Atlas SQL Interface sampler runs. Used by `tests/integration/schema-modes.test.ts`
# (T15) to assert Collection-mode and File-mode produce identical query results.

schema:
  version: 1
  jsonSchema:
    bsonType: object
    properties:
      users:
        bsonType: object
        properties:
          _id:        { bsonType: objectId }
          email:      { bsonType: string }
          name:       { bsonType: string }
          account_id: { bsonType: string }
          created_at: { bsonType: date }
      accounts:
        bsonType: object
        properties:
          _id:        { bsonType: string }
          name:       { bsonType: string }
          tier:       { bsonType: string }
          created_at: { bsonType: date }
      orders:
        bsonType: object
        properties:
          _id:        { bsonType: objectId }
          account_id: { bsonType: string }
          amount:     { bsonType: decimal }
          status:     { bsonType: string }
          created_at: { bsonType: date }
          updated_at: { bsonType: date }
      revenue_events:
        bsonType: object
        properties:
          _id:         { bsonType: objectId }
          account_id:  { bsonType: string }
          amount:      { bsonType: decimal }
          category:    { bsonType: string }
          occurred_at: { bsonType: date }
      # `configs` is the sparse-nested-path regression harness — see the
      # row-shape normalization test (`tests/integration/row-shape-normalization.test.ts`)
      # and `tests/integration/fixtures/seed-data.js` for the seed.
      configs:
        bsonType: object
        properties:
          _id: { bsonType: objectId }
          id:  { bsonType: string }
          agent:
            bsonType: object
            properties:
              displayName: { bsonType: string }
      # Phase B harnesses — must stay in sync with seed-schemas.js so the
      # File-mode and Collection-mode comparison test sees identical
      # schemas. Each block mirrors the corresponding `__sql_schemas` row.
      product_catalog:
        bsonType: object
        properties:
          _id:      { bsonType: objectId }
          id:       { bsonType: string }
          name:     { bsonType: string }
          category: { bsonType: string }
      weird_types:
        bsonType: object
        properties:
          _id:         { bsonType: objectId }
          id:          { bsonType: string }
          id_long:     { bsonType: long }
          bin:         { bsonType: binData }
          uuid:        { bsonType: binData }
          ts:          { bsonType: timestamp }
          occurred_at: { bsonType: date }
          nested:
            bsonType: object
            properties:
              label: { bsonType: string }
              count: { bsonType: int }
          tags:
            bsonType: array
            items:    { bsonType: string }
      granular_events:
        bsonType: object
        properties:
          _id:         { bsonType: objectId }
          id:          { bsonType: string }
          occurred_at: { bsonType: date }
      tz_events:
        bsonType: object
        properties:
          _id:         { bsonType: objectId }
          id:          { bsonType: string }
          occurred_at: { bsonType: date }
