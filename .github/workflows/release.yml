name: Release

# Builds platform-specific napi-rs `.node` binaries and publishes the main
# package plus its 6 prebuilt sub-packages to npm. Trigger is the changesets
# version-bump landing on `main` ŌĆö the workflow compares `package.json`
# version vs the `latest` tag on npm; if unchanged (e.g. a chore PR), it
# exits early.
#
# Authentication is npm Trusted Publishing (OIDC). Each of the 7 npm packages
# must be configured at npmjs.com to trust this repo + this workflow file ŌĆö
# see PUBLISH.md > "One-time npm setup".

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

env:
  DEBUG: napi:*
  NATIVE_NAME: cubejs-mongosql-driver-native
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  detect:
    name: Detect new version
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.detect.outputs.should_publish }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Compare package.json vs npm latest
        id: detect
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          CURRENT=$(node -p "require('./package.json').version")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "$PKG_NAME current version: $CURRENT"

          PUBLISHED='0.0.0'
          if VIEW_OUT=$(npm view "$PKG_NAME@latest" version 2>/dev/null); then
            PUBLISHED=$(echo "$VIEW_OUT" | tr -d '[:space:]')
          fi
          echo "$PKG_NAME published: ${PUBLISHED:-<none>}"

          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "No version change; skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Will publish $PKG_NAME $PUBLISHED -> $CURRENT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: build - ${{ matrix.settings.target }}
    needs: detect
    if: needs.detect.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            short: linux-x64-gnu
            build: pnpm build:rust --target x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            short: linux-arm64-gnu
            build: pnpm build:rust --target aarch64-unknown-linux-gnu --use-cross
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            short: linux-x64-musl
            build: pnpm build:rust --target x86_64-unknown-linux-musl --use-cross
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            short: linux-arm64-musl
            build: pnpm build:rust --target aarch64-unknown-linux-musl --use-cross
          # Both darwin slices build on the Apple-Silicon runner (macos-15,
          # the current GA image ŌĆö macos-13 Intel is retired and macos-14 is
          # deprecated). The x86_64 slice is CROSS-COMPILED: the Apple
          # toolchain ships both arch SDKs, and the x86_64-apple-darwin rust
          # target is installed via `dtolnay/rust-toolchain` (targets:), so
          # `--target x86_64-apple-darwin` on arm64 produces a valid Intel
          # `.node` without needing a (scarce, retiring) Intel macOS runner.
          - host: macos-15
            target: x86_64-apple-darwin
            short: darwin-x64
            build: pnpm build:rust --target x86_64-apple-darwin
          - host: macos-15
            target: aarch64-apple-darwin
            short: darwin-arm64
            build: pnpm build:rust --target aarch64-apple-darwin
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6

      # Version comes from the `packageManager` field in package.json
      # (single source of truth ŌĆö passing `version` too makes
      # pnpm/action-setup@v5 fail with "Multiple versions of pnpm specified").
      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install cross (linux cross-compile targets)
        if: contains(matrix.settings.build, '--use-cross')
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.settings.target }}
          workspaces: |
            . -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native binary
        shell: bash
        run: |
          set -euo pipefail
          ${{ matrix.settings.build }}

      # T10 dylib-name workaround: @napi-rs/cli v2.x expects a hyphenated
      # dylib filename matching the crate `name`, but cargo emits an
      # underscore-normalised variant on some platforms. Idempotent rename
      # before napi's post-build copy phase.
      - name: Normalise dylib filename
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in *.node; do
            normalised="${f//cubejs_mongosql_driver_native/cubejs-mongosql-driver-native}"
            if [ "$f" != "$normalised" ] && [ ! -f "$normalised" ]; then
              echo "Renaming $f -> $normalised"
              mv "$f" "$normalised"
            fi
          done
          ls -la *.node || true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.short }}
          path: ${{ env.NATIVE_NAME }}.${{ matrix.settings.short }}.node
          if-no-files-found: error

      # The root napi-rs loader (`index.js` + `index.d.ts`) is generated by
      # `napi build` only for *host* (non `--use-cross`) targets ŌĆö see the
      # comment in scripts/build-rust.mjs. It's platform-independent, but it
      # is .gitignore'd (regenerated per build) and the `publish` job below
      # never runs a rust build, so without this it's silently absent from
      # the published tarball (issue #7: 1.0.1 shipped without it). Upload it
      # once, from this host build, for the publish job to stage.
      - name: Upload napi loader (index.js/index.d.ts)
        if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v7
        with:
          name: napi-loader
          path: |
            index.js
            index.d.ts
          if-no-files-found: error

  publish:
    name: Publish to npm + GitHub Release
    needs: [detect, build]
    if: needs.detect.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      # Version comes from the `packageManager` field in package.json
      # (single source of truth ŌĆö passing `version` too makes
      # pnpm/action-setup@v5 fail with "Multiple versions of pnpm specified").
      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # Node 24 ships with npm 11.x, which already satisfies Trusted
      # Publishing's >= 11.5.1 requirement ŌĆö no manual upgrade step needed.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build TypeScript
        run: pnpm build:ts

      - name: Download all binary artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      # index.js/index.d.ts are .gitignore'd (regenerated per build) and this
      # job never runs a rust build, so restore them from the host build's
      # `napi-loader` artifact ŌĆö see issue #7.
      - name: Stage napi loader at repo root
        shell: bash
        run: |
          set -euo pipefail
          cp artifacts/napi-loader/index.js index.js
          cp artifacts/napi-loader/index.d.ts index.d.ts
          ls -la index.js index.d.ts

      - name: Stage binaries into per-platform npm sub-packages
        shell: bash
        run: |
          set -euo pipefail
          for dir in artifacts/bindings-*; do
            short="${dir#artifacts/bindings-}"
            mkdir -p "npm/$short"
            mv "$dir"/*.node "npm/$short/"
          done
          ls -laR npm

      # Sync versions across the root package + every per-platform sub-package.
      #
      # We do NOT use `napi prepublish` here: despite its name it also runs
      # `npm publish` for each sub-package, and it is NOT idempotent ŌĆö once the
      # sub-packages exist on the registry (e.g. a prior release that
      # half-published), it aborts with `403 you cannot publish over the
      # previously published versions`, blocking every recovery re-run before
      # the main package can publish. The sub-package stubs already carry the
      # full manifest (name/os/cpu/main/files/...) and the `.node` was staged
      # above, so all that's actually needed is to line up the version numbers;
      # the idempotent `npm publish` steps below then do the publishing.
      - name: Sync sub-package + optionalDependency versions
        shell: bash
        run: |
          set -euo pipefail
          node -e '
            const fs = require("fs");
            const path = require("path");
            const ver = require("./package.json").version;
            // Bump each per-platform sub-package to the release version.
            for (const dir of fs.readdirSync("npm")) {
              const f = path.join("npm", dir, "package.json");
              if (!fs.existsSync(f)) continue;
              const p = JSON.parse(fs.readFileSync(f, "utf8"));
              p.version = ver;
              fs.writeFileSync(f, JSON.stringify(p, null, 2) + "\n");
            }
            // Point the root optionalDependencies at the release version so
            // the published main package resolves the matching binaries.
            const root = JSON.parse(fs.readFileSync("package.json", "utf8"));
            for (const k of Object.keys(root.optionalDependencies || {})) {
              root.optionalDependencies[k] = ver;
            }
            fs.writeFileSync("package.json", JSON.stringify(root, null, 2) + "\n");
            console.log("synced all packages to " + ver);
          '

      # Guard against a repeat of issue #7 (1.0.1 published with `index.js` /
      # `index.d.ts` declared in `files` but absent from the tarball): assert
      # the packed tarball actually contains the napi loader + TS output
      # before publishing anything.
      - name: Verify tarball contains napi loader
        shell: bash
        run: |
          set -euo pipefail
          node -e '
            const { execSync } = require("child_process");
            const files = JSON.parse(execSync("npm pack --dry-run --json").toString())[0].files.map(f => f.path);
            const required = ["index.js", "index.d.ts", "dist/index.js", "dist/index.d.ts"];
            const missing = required.filter(f => !files.includes(f));
            if (missing.length) {
              console.error("::error::npm pack is missing required file(s): " + missing.join(", "));
              process.exit(1);
            }
            console.log("Tarball contains: " + required.join(", "));
          '

      # Publish sub-packages FIRST. The main package's optionalDependencies
      # references them by name+version; if main publishes before the
      # sub-packages exist on the registry, downstream `npm install` fails to
      # resolve. `--provenance` requires Trusted Publishing OIDC (CI only).
      #
      # IDEMPOTENT: skip any package whose exact version is already on the
      # registry. npm's client can publish a version successfully and STILL
      # exit non-zero (e.g. a transient error triggers an internal retry that
      # then gets `403 you cannot publish over the previously published
      # versions`). Under `set -e` that used to abort the whole job AFTER the
      # sub-packages were published but BEFORE the main package ŌĆö leaving a
      # half-published release that no re-run could finish (every retry died on
      # the already-published sub-packages). Skipping already-published
      # versions makes re-runs converge: they publish only what's missing.
      - name: Publish sub-packages
        shell: bash
        run: |
          set -euo pipefail
          for pkg in npm/*/; do
            dir="${pkg%/}"
            name=$(node -p "require('./$dir/package.json').name")
            ver=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "::notice::$name@$ver already published ŌĆö skipping"
              continue
            fi
            echo "::group::Publishing $name@$ver"
            (cd "$dir" && npm publish --provenance --access public)
            echo "::endgroup::"
          done

      - name: Publish main package
        shell: bash
        run: |
          set -euo pipefail
          name=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "::notice::$name@$ver already published ŌĆö skipping"
          else
            npm publish --provenance --access public
          fi

      - name: Tag release + create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VER="${{ needs.detect.outputs.version }}"
          TAG="v$VER"

          # IDEMPOTENT: only create the tag / release if they don't exist yet,
          # so a re-run that completes a half-published release doesn't fail
          # here.
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::notice::tag $TAG already exists ŌĆö skipping tag push"
          else
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git tag -a "$TAG" -m "$TAG"
            git push origin "$TAG"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::GitHub release $TAG already exists ŌĆö skipping"
          else
            PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -vx "$TAG" | head -1 || true)
            if [ -n "$PREV_TAG" ]; then
              gh release create "$TAG" --title "$TAG" --generate-notes --notes-start-tag "$PREV_TAG"
            else
              gh release create "$TAG" --title "$TAG" --generate-notes
            fi
          fi
